<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unblocked Games Portal</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; }
    .navbar { background: #333; overflow: hidden; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .navbar a { color: white; text-decoration: none; padding: 8px 16px; font-weight: bold; }
    .navbar a:hover { background-color: #575757; border-radius: 4px; }
    .navbar .logo { font-size: 24px; }
    .content { padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .game-card { background: white; border-radius: 8px; width: 200px; height: 150px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; text-align: center; }
    .game-card:hover { transform: translateY(-5px); box-shadow: 0 6px 10px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu">
      <a href="index.html">Home</a>
    </div>
  </div>

  <div class="content">
    <a href="click-counter.html" class="game-card">Click Counter</a>
    <a href="snake.html" class="game-card">Snake Game</a>
    <a href="rps.html" class="game-card">Rock-Paper-Scissors</a>
    <a href="dodge.html" class="game-card">Dodge Game</a>

    <!-- New games -->
    <a href="memory.html" class="game-card">Memory Match</a>
    <a href="flappy.html" class="game-card">Flappy Block</a>

    <a href="math-quiz.html" class="game-card">Math Quiz</a>
  </div>
