<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unblocked Games</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    /* Navigation Bar */
    .navbar {
      background-color: #333;
      overflow: hidden;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      font-weight: bold;
    }

    .navbar a:hover {
      background-color: #575757;
      border-radius: 4px;
    }

    .navbar .logo {
      font-size: 24px;
    }

    /* Main Content */
    .content {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .game-card {
      background-color: white;
      border-radius: 8px;
      width: 200px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu">
      <a href="#">Home</a>
      <!-- Add more menu items here -->
    </div>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="game-card">Game 1</div>
    <div class="game-card">Game 2</div>
    <div class="game-card">Game 3</div>
    <div class="game-card">Game 4</div>
    <!-- Add more game cards here -->
  </div>

</body>
</html>
