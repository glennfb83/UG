<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; text-align: center; }
    .navbar { background: #333; overflow: hidden; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .navbar a { color: white; text-decoration: none; padding: 8px 16px; font-weight: bold; }
    .navbar a:hover { background-color: #575757; border-radius: 4px; }
    .navbar .logo { font-size: 24px; }
    canvas { background-color: #222; margin-top: 20px; display: block; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu">
      <a href="index.html">Home</a>
    </div>
  </div>

  <h1>Snake Game</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const grid = 20;
    let snake = [{x: 200, y: 200}];
    let dx = grid;
    let dy = 0;
    let food = {x: Math.floor(Math.random()*20)*grid, y: Math.floor(Math.random()*20)*grid};

    function gameLoop() {
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Move snake
      let head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head);

      // Eat food
      if(head.x === food.x && head.y === food.y){
        food.x = Math.floor(Math.random()*20)*grid;
        food.y = Math.floor(Math.random()*20)*grid;
      } else {
        snake.pop();
      }

      // Draw food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, grid, grid);

      // Draw snake
      ctx.fillStyle = 'lime';
      snake.forEach(segment => ctx.fillRect(segment.x, segment.y, grid-1, grid-1));

      // Check collision
      if(head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.slice(1).some(seg => seg.x === head.x && seg.y === head.y)){
        alert('Game Over!');
        snake = [{x: 200, y: 200}];
        dx = grid;
        dy = 0;
      }
    }

    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowUp' && dy === 0){ dx = 0; dy = -grid; }
      if(e.key === 'ArrowDown' && dy === 0){ dx = 0; dy = grid; }
      if(e.key === 'ArrowLeft' && dx === 0){ dx = -grid; dy = 0; }
      if(e.key === 'ArrowRight' && dx === 0){ dx = grid; dy = 0; }
    });

    setInterval(gameLoop, 100);
  </script>

</body>
</html>
