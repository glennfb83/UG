<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <style>
    body { font-family: Arial; background: #f2f2f2; text-align: center; margin: 0; }
    .navbar { background: #333; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .navbar a { color: white; text-decoration: none; padding: 8px 16px; font-weight: bold; }
    .navbar a:hover { background-color: #575757; border-radius: 4px; }
    .navbar .logo { font-size: 24px; }
    #game { display: grid; grid-template-columns: repeat(4, 80px); gap: 10px; justify-content: center; margin-top: 40px; }
    .card { width: 80px; height: 80px; background: #333; color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu"><a href="index.html">Home</a></div>
  </div>

  <h1>Memory Match</h1>
  <div id="game"></div>

  <script>
    const gameContainer = document.getElementById('game');
    let cards = ['A','A','B','B','C','C','D','D','E','E','F','F','G','G','H','H'];
    let firstCard = null, secondCard = null, lock = false;

    function shuffle(array){ return array.sort(() => Math.random()-0.5); }
    cards = shuffle(cards);

    cards.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.value = c;
      card.innerText = '';
      card.onclick = () => {
        if(lock || card.innerText) return;
        card.innerText = c;
        if(!firstCard){ firstCard = card; return; }
        secondCard = card;
        if(firstCard.dataset.value === secondCard.dataset.value){
          firstCard = secondCard = null;
        } else {
          lock = true;
          setTimeout(() => { firstCard.innerText = ''; secondCard.innerText = ''; firstCard = secondCard = null; lock = false; }, 800);
        }
      };
      gameContainer.appendChild(card);
    });
  </script>
</body>
</html>
