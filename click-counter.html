<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Counter Game</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; text-align: center; }
    .navbar { background: #333; overflow: hidden; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .navbar a { color: white; text-decoration: none; padding: 8px 16px; font-weight: bold; }
    .navbar a:hover { background-color: #575757; border-radius: 4px; }
    .navbar .logo { font-size: 24px; }
    h1 { margin-top: 40px; }
    #counter { font-size: 48px; margin: 20px 0; }
    button { padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 8px; border: none; background-color: #333; color: white; }
    button:hover { background-color: #575757; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu">
      <a href="index.html">Home</a>
    </div>
  </div>

  <h1>Click Counter</h1>
  <div id="counter">0</div>
  <button onclick="increment()">Click Me!</button>

  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('counter').innerText = count;
    }
  </script>

</body>
</html>
