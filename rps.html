<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f2f2f2; text-align: center; }
    .navbar { background: #333; overflow: hidden; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
    .navbar a { color: white; text-decoration: none; padding: 8px 16px; font-weight: bold; }
    .navbar a:hover { background-color: #575757; border-radius: 4px; }
    .navbar .logo { font-size: 24px; }
    button { padding: 10px 20px; margin: 10px; font-size: 20px; cursor: pointer; border-radius: 8px; border: none; background-color: #333; color: white; }
    button:hover { background-color: #575757; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo">Unblocked Games</div>
    <div class="menu">
      <a href="index.html">Home</a>
    </div>
  </div>

  <h1>Rock Paper Scissors</h1>
  <div>
    <button onclick="play('rock')">Rock</button>
    <button onclick="play('paper')">Paper</button>
    <button onclick="play('scissors')">Scissors</button>
  </div>
  <h2 id="result"></h2>

  <script>
    function play(userChoice){
      const choices = ['rock','paper','scissors'];
      const computer = choices[Math.floor(Math.random()*3)];

      if(userChoice === computer){
        document.getElementById('result').innerText = `Tie! Both chose ${userChoice}`;
      } else if(
        (userChoice === 'rock' && computer === 'scissors') ||
        (userChoice === 'scissors' && computer === 'paper') ||
        (userChoice === 'paper' && computer === 'rock')
      ){
        document.getElementById('result').innerText = `You Win! ${userChoice} beats ${computer}`;
      } else {
        document.getElementById('result').innerText = `You Lose! ${computer} beats ${userChoice}`;
      }
    }
  </script>

</body>
</html>
